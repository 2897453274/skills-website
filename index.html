<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技能可视化展示</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎯 技能图谱</h1>
            <p>专业能力可视化展示</p>
        </header>
        
        <section id="radar-chart">
            <h2>技能雷达图</h2>
            <div id="radar-container"></div>
        </section>

        <section id="timeline">
            <h2>学习时间线</h2>
            <div id="timeline-container"></div>
        </section>

        <section id="skills-list">
            <h2>技能详情</h2>
            <div class="skills-grid">
                <div class="skill-card">
                    <h3>UI/UX 设计</h3>
                    <p><strong>领域:</strong> 电商平台</p>
                    <p><strong>水平:</strong> 中级</p>
                    <p><strong>经验:</strong> 2年</p>
                </div>
                <div class="skill-card">
                    <h3>机器学习</h3>
                    <p><strong>领域:</strong> 预测模型</p>
                    <p><strong>水平:</strong> 中级</p>
                    <p><strong>经验:</strong> 1年</p>
                </div>
            </div>
        </section>

        <section id="achievements">
            <h2>学习成果</h2>
            <div class="achievement-card">
                <h3>2025-01: OpenClaw 精通</h3>
                <p>掌握了 OpenClaw 所有核心功能</p>
                <div class="projects">
                    <span class="project-tag">智能助手</span>
                    <span class="project-tag">自动化流程</span>
                </div>
            </div>
        </section>
    </div>

    <script type="module" src="js/script.js"></script>
    <script type="module" src="js/update-skills.js"></script>
    <script type="module" src="js/skill-manager.js"></script>
</body>
</html>
