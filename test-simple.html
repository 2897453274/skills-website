<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简单测试页面</title>
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 2rem;
            text-align: center;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        h1 {
            background: linear-gradient(45deg, #00ffff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
        
        .status {
            margin: 2rem 0;
            padding: 1rem;
            border-radius: 8px;
            font-weight: bold;
        }
        
        .success {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }
        
        .error {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        
        .info {
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 OpenClaw 技能中心</h1>
        <p>简单测试页面 - 构建状态检查</p>
        
        <div class="status info">
            <h3>📊 构建状态检测</h3>
            <p>这个页面用于测试GitHub Pages构建功能</p>
        </div>
        
        <div class="status success" id="build-status">
            <h3>⏳ 正在检测构建状态...</h3>
            <p>请稍候，正在检查部署情况</p>
        </div>
        
        <div style="margin-top: 2rem;">
            <h3>📋 基本信息</h3>
            <p><strong>仓库:</strong> 2897453274/skills-website</p>
            <p><strong>分支:</strong> main</p>
            <p><strong>预期地址:</strong> https://2897453274.github.io/skills-website/</p>
            <p><strong>最后更新:</strong> <span id="last-update">2026-03-03 14:30</span></p>
        </div>
        
        <div style="margin-top: 2rem; padding: 1rem; background: rgba(255,255,255,0.05); border-radius: 8px;">
            <h4>🔧 技术栈</h4>
            <p>HTML5 + CSS3 + JavaScript (传统语法)</p>
            <p>无外部依赖，无模块化语法</p>
            <p>完全兼容GitHub Pages环境</p>
        </div>
    </div>

    <script>
        // 页面加载后检查状态
        document.addEventListener('DOMContentLoaded', function() {
            console.log('简单测试页面加载完成');
            
            // 模拟状态检查
            setTimeout(() => {
                checkBuildStatus();
            }, 2000);
        });
        
        function checkBuildStatus() {
            // 这里可以添加实际的构建状态检查逻辑
            const statusElement = document.getElementById('build-status');
            
            // 模拟构建成功
            statusElement.innerHTML = `
                <h3>✅ 构建成功！</h3>
                <p>页面已成功部署到GitHub Pages</p>
                <p>访问地址: <a href="https://2897453274.github.io/skills-website/" style="color: #10b981;">https://2897453274.github.io/skills-website/</a></p>
            `;
            
            statusElement.className = 'status success';
            
            // 更新最后更新时间
            document.getElementById('last-update').textContent = new Date().toLocaleString('zh-CN');
        }
        
        // 简单的交互效果
        document.querySelectorAll('.status').forEach(element => {
            element.addEventListener('click', function() {
                this.style.transform = 'scale(1.02)';
                setTimeout(() => {
                    this.style.transform = 'scale(1)';
                }, 300);
            });
        });
    </script>
</body>
</html>
